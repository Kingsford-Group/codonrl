<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>demo of codonrl inference</title>
  <style>
    :root { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; }
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #fff; color: #111; }
    .card {
      width: min(760px, 92vw);
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 28px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.06);
      text-align: center;
    }
    h1 { margin: 0 0 18px; font-size: 28px; font-weight: 700; letter-spacing: 0.2px; }
    .controls { display: grid; gap: 12px; justify-items: center; }
    input[type="file"] { max-width: 100%; }
    button {
      padding: 10px 16px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      background: #f9fafb;
      cursor: pointer;
      font-weight: 600;
    }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .status {
      margin-top: 16px;
      font-weight: 600;
      min-height: 24px;
    }
    pre {
      margin-top: 14px;
      text-align: left;
      white-space: pre-wrap;
      word-break: break-word;
      background: #fafafa;
      border: 1px solid #eee;
      border-radius: 12px;
      padding: 14px;
      max-height: 380px;
      overflow: auto;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 13px;
    }
    .row { display:flex; gap: 10px; justify-content:center; flex-wrap:wrap; margin-top: 6px; }
    label { font-size: 13px; color: #374151; display:flex; align-items:center; gap: 6px; }
    input[type="number"] { width: 110px; padding: 6px; border: 1px solid #d1d5db; border-radius: 8px; }
    .hint { margin-top: 10px; font-size: 12px; color: #6b7280; line-height: 1.4; }
  </style>
</head>
<body>
  <div class="card">
    <h1>demo of codonrl inference</h1>

    <div class="controls">
      <input id="file" type="file" accept=".fa,.fasta,.txt,*/*" />
      <div class="row">
        <label>alpha <input id="alpha" type="number" step="0.1" value="0.5"></label>
        <label><input id="metrics" type="checkbox"> include CAI/MFE</label>
      </div>
      <button id="run" disabled>Run inference</button>
    </div>

    <div class="status" id="status">Please upload a protein FASTA file.</div>
    <pre id="output">{}</pre>

    <div class="hint">
      This page calls <code>POST /infer</code> on the same server.<br/>
      Run the backend and open <code>http://localhost:8000</code>.
    </div>
  </div>

<script>
  const fileEl = document.getElementById("file");
  const runBtn = document.getElementById("run");
  const statusEl = document.getElementById("status");
  const outputEl = document.getElementById("output");
  const alphaEl = document.getElementById("alpha");
  const metricsEl = document.getElementById("metrics");

  let selectedFile = null;

  function setStatus(msg) { statusEl.textContent = msg; }
  function setOutput(text) { outputEl.textContent = text; }

  fileEl.addEventListener("change", (ev) => {
    selectedFile = ev.target.files && ev.target.files[0];
    if (!selectedFile) {
      runBtn.disabled = true;
      setStatus("Please upload a protein FASTA file.");
      setOutput("{}");
      return;
    }
    runBtn.disabled = false;
    setStatus(`Loaded: ${selectedFile.name}`);
    setOutput("{}");
  });

  async function runInference() {
    if (!selectedFile) throw new Error("No FASTA file selected.");

    const alpha = Number(alphaEl.value);
    if (!Number.isFinite(alpha)) throw new Error("alpha must be a number.");

    const includeMetrics = metricsEl.checked;

    runBtn.disabled = true;
    setStatus("algorithm running, please wait …");
    setOutput("{}");

    const form = new FormData();
    form.append("protein_fasta", selectedFile);

    const url = `/infer?alpha=${encodeURIComponent(alpha)}&include_metrics=${includeMetrics ? "true" : "false"}`;
    const res = await fetch(url, { method: "POST", body: form });

    if (!res.ok) {
      const txt = await res.text();
      throw new Error(`Inference failed (${res.status}): ${txt}`);
    }

    const json = await res.json();

    let out = "";
    out += "RNA FASTA (CodonRL output)\n";
    out += "-------------------------\n";
    out += json.rna_fasta;

    out += `\nProtein length: ${json.protein_length} aa\n`;
    out += `alpha: ${json.alpha}\n`;

    if (json.cai !== undefined) out += `CAI: ${json.cai}\n`;
    if (json.mfe !== undefined) out += `MFE (${json.mfe_source || "unknown"}): ${json.mfe}\n`;

    setOutput(out);
    setStatus("done.");
    runBtn.disabled = false;
  }

  runBtn.addEventListener("click", async () => {
    try {
      await runInference();
    } catch (e) {
      setStatus(`Error: ${e.message}`);
      runBtn.disabled = false;
    }
  });
</script>
</body>
</html>
